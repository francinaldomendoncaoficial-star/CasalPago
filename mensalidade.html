<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💰 Mensalidade</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --bg: #0f0e17; --surface: #1a1928; --surface2: #252438;
    --border: #2e2c4a; --text: #fffffe; --text2: #a7a5c0;
    --accent: #7c6af7; --success: #4caf82; --danger: #e05c5c;
    --warn: #e8c468; --r: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .light {
    --bg: #f5f0ff; --surface: #ffffff; --surface2: #ece8f8;
    --border: #d5cff0; --text: #1a1532; --text2: #6b648a;
    --shadow: 0 4px 24px rgba(100,80,200,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; transition: background .3s, color .3s; }

  /* ── LOGIN ───────────────────────────────────────────────── */
  #loginScreen {
    position: fixed; inset: 0; z-index: 999; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px;
  }
  .login-logo { font-size: 52px; margin-bottom: 8px; }
  .login-title {
    font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), #a084ee);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
  }
  .login-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
  .login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 28px 24px; box-shadow: var(--shadow); }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 13px 15px; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; transition: border-color .2s;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .btn-login {
    width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), #a084ee);
    border: none; border-radius: 14px; color: #fff; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: transform .15s;
  }
  .btn-login:active { transform: scale(.98); }
  .btn-login:disabled { opacity: .6; cursor: not-allowed; }
  .login-error { margin-top: 14px; padding: 11px 14px; background: rgba(224,92,92,.15); border: 1px solid var(--danger); border-radius: 10px; color: var(--danger); font-size: 13px; text-align: center; display: none; }

  /* ── APP ─────────────────────────────────────────────────── */
  #appShell { display: none; flex-direction: column; height: 100%; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -.5px; }
  .header-actions { display: flex; gap: 10px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text); transition: transform .15s; }
  .icon-btn:active { transform: scale(.92); }

  /* ── SCROLL AREA ─────────────────────────────────────────── */
  .scroll-area { flex: 1; overflow-y: auto; padding: 16px 16px 100px; }

  /* ── SALDO HERO ──────────────────────────────────────────── */
  .saldo-hero {
    border-radius: 20px; padding: 22px; margin-bottom: 16px;
    position: relative; overflow: hidden;
  }
  .saldo-hero.devendo  { background: linear-gradient(135deg, #e05c5c, #c0392b); }
  .saldo-hero.quite    { background: linear-gradient(135deg, #4caf82, #27ae60); }
  .saldo-hero.credito  { background: linear-gradient(135deg, #7c6af7, #a084ee); }
  .saldo-hero::before  { content: '💰'; position: absolute; right: 16px; top: 12px; font-size: 48px; opacity: .2; }
  .saldo-label  { font-size: 12px; font-weight: 500; opacity: .85; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
  .saldo-amount { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: #fff; margin: 4px 0 4px; }
  .saldo-sub    { font-size: 13px; color: rgba(255,255,255,.85); }

  /* ── MÊS SELECTOR ────────────────────────────────────────── */
  .mes-selector {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    padding: 14px 16px; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .mes-nav { background: var(--surface2); border: none; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 18px; color: var(--text); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .mes-label { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; text-align: center; flex: 1; }
  .mes-progress-wrap { margin-top: 10px; }
  .mes-progress-bar  { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .mes-progress-fill { height: 100%; border-radius: 4px; transition: width .4s; }
  .mes-progress-fill.ok      { background: var(--success); }
  .mes-progress-fill.parcial { background: var(--warn); }
  .mes-progress-fill.zero    { background: var(--danger); }
  .mes-progress-text { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-top: 4px; }

  /* ── CARDS ROW ───────────────────────────────────────────── */
  .cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
  .mini-card-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .mini-card-value { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-top: 4px; }
  .mini-card-value.verde    { color: var(--success); }
  .mini-card-value.vermelho { color: var(--danger); }
  .mini-card-value.roxo     { color: var(--accent); }

  /* ── SEÇÃO ───────────────────────────────────────────────── */
  .section-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .section-title .btn-sm { font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; }

  /* ── PAGAMENTOS LIST ─────────────────────────────────────── */
  .pag-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 13px 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .pag-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(124,106,247,.18); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .pag-info { flex: 1; min-width: 0; }
  .pag-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pag-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .pag-valor { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--success); flex-shrink: 0; }
  .pag-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; flex-shrink: 0; padding: 4px; }

  /* ── HISTORICO TABLE ─────────────────────────────────────── */
  .hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 16px; }
  .hist-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 12px; align-items: center; }
  .hist-row:last-child { border-bottom: none; }
  .hist-row.header { background: var(--surface2); font-weight: 600; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; }
  .hist-mes { font-weight: 600; }
  .hist-val { text-align: right; }
  .hist-saldo { text-align: right; font-weight: 700; }
  .hist-saldo.pos { color: var(--success); }
  .hist-saldo.neg { color: var(--danger); }
  .hist-saldo.zer { color: var(--text2); }

  /* ── GRÁFICO ─────────────────────────────────────────────── */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 16px; }
  .chart-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 14px; }

  /* ── CONFIG VALOR BASE ───────────────────────────────────── */
  .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 16px; }
  .config-row { display: flex; align-items: center; gap: 10px; }
  .config-row .form-input { flex: 1; margin: 0; }
  .btn-save-cfg { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 13px 18px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0; }

  /* ── MODAL ───────────────────────────────────────────────── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px 20px 40px; animation: slideUp .3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), #a084ee); border: none; border-radius: 14px; color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: transform .15s; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .btn-secondary { width: 100%; padding: 13px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .amount-wrap { background: var(--surface2); border: 2px solid var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .amount-big { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; text-align: center; border: none; background: transparent; color: var(--text); width: 100%; outline: none; }
  .amount-big::placeholder { color: var(--border); }
  .currency-sym { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: var(--text2); }

  /* ── FAB ─────────────────────────────────────────────────── */
  .fab { position: fixed; bottom: 28px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a084ee); border: none; cursor: pointer; font-size: 26px; color: #fff; box-shadow: 0 4px 20px rgba(124,106,247,.5); display: flex; align-items: center; justify-content: center; z-index: 50; transition: transform .15s; }
  .fab:active { transform: scale(.93); }

  /* ── EMPTY ───────────────────────────────────────────────── */
  .empty-state { text-align: center; padding: 30px 20px; color: var(--text2); }
  .empty-state .emoji { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ── SNACKBAR ────────────────────────────────────────────── */
  .snackbar { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; opacity: 0; transition: all .3s; z-index: 300; white-space: nowrap; }
  .snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LOADING ─────────────────────────────────────────────── */
  .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 500; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn .25s ease; }
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-logo">👨🏾❤️👩🏼</div>
  <div class="login-title">Mensalidade</div>
  <div class="login-sub">Controle do repasse mensal</div>
  <div class="login-card">
    <div class="form-group">
      <label class="form-label">Login</label>
      <input type="text" id="loginInput" class="form-input" placeholder="Seu login" autocomplete="username" autocapitalize="none">
    </div>
    <div class="form-group" style="margin-bottom:4px;">
      <label class="form-label">Senha</label>
      <input type="password" id="senhaInput" class="form-input" placeholder="Sua senha" autocomplete="current-password">
    </div>
    <div id="loginError" class="login-error"></div>
    <button class="btn-login" id="btnLogin" onclick="fazerLogin()">Entrar →</button>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════ -->
<div id="appShell">

  <div class="header">
    <h1>💰 Mensalidade</h1>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()">🌙</button>
      <button class="icon-btn" onclick="sair()">🚪</button>
    </div>
  </div>

  <div class="scroll-area" id="scrollArea">

    <!-- Saldo geral -->
    <div class="saldo-hero quite fade-in" id="saldoHero">
      <div class="saldo-label">Saldo acumulado</div>
      <div class="saldo-amount" id="saldoAmount">R$ 0,00</div>
      <div class="saldo-sub" id="saldoSub">Carregando…</div>
    </div>

    <!-- Navegação de mês -->
    <div class="mes-selector">
      <button class="mes-nav" onclick="mudarMes(-1)">‹</button>
      <div style="flex:1;">
        <div class="mes-label" id="mesLabel">—</div>
        <div class="mes-progress-wrap">
          <div class="mes-progress-text">
            <span id="progTextoEsq">Pago: R$ 0,00</span>
            <span id="progTextoDireita">Meta: R$ 0,00</span>
          </div>
          <div class="mes-progress-bar">
            <div class="mes-progress-fill parcial" id="progFill" style="width:0%"></div>
          </div>
        </div>
      </div>
      <button class="mes-nav" onclick="mudarMes(+1)">›</button>
    </div>

    <!-- Mini cards do mês -->
    <div class="cards-row">
      <div class="mini-card">
        <div class="mini-card-label">Pago no mês</div>
        <div class="mini-card-value verde" id="mesPago">R$ 0,00</div>
      </div>
      <div class="mini-card">
        <div class="mini-card-label">Falta pagar</div>
        <div class="mini-card-value vermelho" id="mesFalta">R$ 0,00</div>
      </div>
    </div>

    <!-- Valor base config -->
    <div class="config-card">
      <div class="form-label" style="margin-bottom:10px;">⚙️ Valor base mensal</div>
      <div class="config-row">
        <input type="number" class="form-input" id="cfgValorBase" placeholder="1000" step="50" min="0">
        <button class="btn-save-cfg" onclick="salvarValorBase()">Salvar</button>
      </div>
    </div>

    <!-- Pagamentos do mês selecionado -->
    <div class="section-title">
      <span>Pagamentos do mês</span>
      <button class="btn-sm" onclick="abrirModal()">+ Registrar</button>
    </div>
    <div id="pagList"></div>

    <!-- Gráfico -->
    <div class="chart-card">
      <div class="chart-title">📈 Pago × Devido por mês</div>
      <canvas id="grafico" height="200"></canvas>
    </div>

    <!-- Histórico mês a mês -->
    <div class="section-title">📅 Histórico mensal</div>
    <div class="hist-card">
      <div class="hist-row header">
        <span>Mês</span>
        <span class="hist-val">Devido</span>
        <span class="hist-val">Pago</span>
        <span class="hist-saldo">Saldo</span>
      </div>
      <div id="histBody"></div>
    </div>

  </div><!-- /scroll-area -->

  <button class="fab" onclick="abrirModal()">＋</button>

</div><!-- /appShell -->

<!-- ══ MODAL: REGISTRAR PAGAMENTO ════════════════════════════ -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">💸 Registrar Pagamento</div>

    <div class="form-group">
      <label class="form-label">Mês de referência</label>
      <input type="month" class="form-input" id="pagMes">
    </div>

    <div class="form-group">
      <label class="form-label">Valor *</label>
      <div class="amount-wrap">
        <span class="currency-sym">R$</span>
        <input type="number" class="amount-big" id="pagValor" placeholder="0,00" step="0.01" min="0">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input type="text" class="form-input" id="pagDesc" placeholder="Ex: Combustível, Energia, Repasse…">
    </div>

    <div class="form-group">
      <label class="form-label">Data do pagamento</label>
      <input type="date" class="form-input" id="pagData">
    </div>

    <button class="btn-primary" id="btnSalvarPag" onclick="salvarPagamento()">✅ Salvar</button>
    <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<div class="snackbar" id="snackbar"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  CONFIGURAÇÃO                                           ║
// ╚══════════════════════════════════════════════════════════╝
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvKebJRFCkJT8AEamA0wi3ipn-To2_frEo3-ZuNMTo9nsuOxVnywdfoPshgMKexEKIUA/exec'; // mesma URL do CasalPago

// ╔══════════════════════════════════════════════════════════╗
// ║  ESTADO                                                 ║
// ╚══════════════════════════════════════════════════════════╝
let usuario      = null;
let valorBase    = 1000;
let pagamentos   = [];   // todos os pagamentos
let historico    = [];   // resumo mês a mês calculado pelo GAS
let saldoAtual   = 0;
let mesSelecionado = '';  // "YYYY-MM"
let graficoInst  = null;

// ╔══════════════════════════════════════════════════════════╗
// ║  API                                                    ║
// ╚══════════════════════════════════════════════════════════╝
async function api(body) {
  const r = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('Rede: ' + r.status);
  return r.json();
}

// ╔══════════════════════════════════════════════════════════╗
// ║  LOGIN / LOGOUT                                         ║
// ╚══════════════════════════════════════════════════════════╝
document.getElementById('senhaInput').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('senhaInput').focus(); });

async function fazerLogin() {
  const login = document.getElementById('loginInput').value.trim();
  const senha = document.getElementById('senhaInput').value.trim();
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('btnLogin');
  errEl.style.display = 'none';
  if (!login || !senha) { errEl.textContent = 'Preencha login e senha.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    const res = await api({ action: 'login', login, senha });
    if (!res.ok) { errEl.textContent = res.error || 'Login incorreto.'; errEl.style.display = 'block'; return; }
    usuario = res.usuario;
    await iniciarApp();
  } catch(e) {
    errEl.textContent = '⚠️ Erro de conexão.'; errEl.style.display = 'block';
  } finally { btn.disabled = false; btn.textContent = 'Entrar →'; }
}

function sair() {
  if (!confirm('Deseja sair?')) return;
  usuario = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginInput').value = '';
  document.getElementById('senhaInput').value = '';
}

// ╔══════════════════════════════════════════════════════════╗
// ║  INICIALIZAÇÃO                                          ║
// ╚══════════════════════════════════════════════════════════╝
async function iniciarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';

  // Mês atual como padrão
  mesSelecionado = mesAtual();
  await carregarDados();
}

async function carregarDados() {
  showLoading(true);
  try {
    const res = await api({ action: 'getMensalidade', login: usuario.login });
    if (!res.ok) { snack('Erro: ' + res.error); return; }
    valorBase  = res.valorBase  || 1000;
    pagamentos = res.pagamentos || [];
    historico  = res.historico  || [];
    saldoAtual = res.saldoAtual || 0;
    renderTudo();
  } catch(e) { snack('⚠️ Erro de conexão.'); }
  finally { showLoading(false); }
}

// ╔══════════════════════════════════════════════════════════╗
// ║  RENDER                                                 ║
// ╚══════════════════════════════════════════════════════════╝
function renderTudo() {
  renderSaldoHero();
  renderMesSelector();
  renderPagamentos();
  renderHistorico();
  renderGrafico();
  document.getElementById('cfgValorBase').value = valorBase;
}

function fmt(v) {
  return 'R$ ' + parseFloat(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function mesAtual() {
  return new Date().toISOString().slice(0, 7);
}

function nomeMes(anoMes) {
  if (!anoMes) return '';
  const [y, m] = anoMes.split('-');
  const nomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return nomes[parseInt(m) - 1] + '/' + y;
}

function renderSaldoHero() {
  const hero = document.getElementById('saldoHero');
  const amt  = document.getElementById('saldoAmount');
  const sub  = document.getElementById('saldoSub');
  amt.textContent = fmt(Math.abs(saldoAtual));
  if (Math.abs(saldoAtual) < 0.01) {
    hero.className = 'saldo-hero quite fade-in';
    sub.textContent = '🎉 Tudo em dia! Saldo zerado.';
  } else if (saldoAtual < 0) {
    hero.className = 'saldo-hero devendo fade-in';
    sub.textContent = '⚠️ Valor em aberto acumulado';
  } else {
    hero.className = 'saldo-hero credito fade-in';
    sub.textContent = '✅ Crédito acumulado para os próximos meses';
  }
}

function renderMesSelector() {
  document.getElementById('mesLabel').textContent = nomeMes(mesSelecionado);

  // Pagamentos do mês selecionado
  const pagsMes = pagamentos.filter(p => p.anoMes === mesSelecionado);
  const totalPago = pagsMes.reduce((s, p) => s + p.valor, 0);

  // Calcula quanto já foi pago contando saldo acumulado anterior
  const histMes = historico.find(h => h.anoMes === mesSelecionado);
  const devido  = valorBase;
  const falta   = Math.max(0, devido - totalPago);
  const pct     = Math.min(100, (totalPago / devido) * 100);

  document.getElementById('mesPago').textContent  = fmt(totalPago);
  document.getElementById('mesFalta').textContent = fmt(falta);
  document.getElementById('progTextoEsq').textContent    = 'Pago: ' + fmt(totalPago);
  document.getElementById('progTextoDireita').textContent = 'Meta: ' + fmt(devido);

  const fill = document.getElementById('progFill');
  fill.style.width = pct + '%';
  fill.className = 'mes-progress-fill ' + (pct >= 100 ? 'ok' : pct > 0 ? 'parcial' : 'zero');
}

function renderPagamentos() {
  const el = document.getElementById('pagList');
  const pagsMes = pagamentos.filter(p => p.anoMes === mesSelecionado);
  if (!pagsMes.length) {
    el.innerHTML = '<div class="empty-state"><span class="emoji">💸</span>Nenhum pagamento neste mês.</div>';
    return;
  }
  el.innerHTML = pagsMes.map(p => `
    <div class="pag-item">
      <div class="pag-avatar">💸</div>
      <div class="pag-info">
        <div class="pag-desc">${p.descricao || 'Pagamento'}</div>
        <div class="pag-meta">${p.data ? new Date(p.data + 'T12:00').toLocaleDateString('pt-BR') : ''}</div>
      </div>
      <div class="pag-valor">${fmt(p.valor)}</div>
      <button class="pag-del" onclick="excluirPagamento('${p.id}')" title="Excluir">🗑️</button>
    </div>
  `).join('');
}

function renderHistorico() {
  const el = document.getElementById('histBody');
  if (!historico.length) {
    el.innerHTML = '<div class="hist-row"><span style="color:var(--text2);font-size:13px;grid-column:1/-1;text-align:center;padding:16px;">Nenhum dado ainda.</span></div>';
    return;
  }
  el.innerHTML = [...historico].reverse().map(h => {
    const cls = Math.abs(h.saldo) < 0.01 ? 'zer' : h.saldo > 0 ? 'pos' : 'neg';
    const sinal = h.saldo > 0.01 ? '+' : '';
    return `<div class="hist-row">
      <span class="hist-mes">${nomeMes(h.anoMes)}</span>
      <span class="hist-val" style="color:var(--text2)">${fmt(h.devido)}</span>
      <span class="hist-val" style="color:var(--success)">${fmt(h.pago)}</span>
      <span class="hist-saldo ${cls}">${sinal}${fmt(h.saldo)}</span>
    </div>`;
  }).join('');
}

function renderGrafico() {
  const ctx = document.getElementById('grafico').getContext('2d');
  if (graficoInst) { graficoInst.destroy(); graficoInst = null; }

  if (!historico.length) return;

  const ultimos = historico.slice(-6); // últimos 6 meses
  const labels  = ultimos.map(h => nomeMes(h.anoMes).replace('/20', '/'));
  const devidos = ultimos.map(h => h.devido);
  const pagos   = ultimos.map(h => h.pago);

  graficoInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Devido',
          data: devidos,
          backgroundColor: 'rgba(224,92,92,0.5)',
          borderColor: '#e05c5c',
          borderWidth: 1.5,
          borderRadius: 6
        },
        {
          label: 'Pago',
          data: pagos,
          backgroundColor: 'rgba(76,175,130,0.6)',
          borderColor: '#4caf82',
          borderWidth: 1.5,
          borderRadius: 6
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#a7a5c0', font: { family: 'DM Sans', size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + ctx.dataset.label + ': R$ ' +
              ctx.parsed.y.toLocaleString('pt-BR', { minimumFractionDigits: 2 })
          }
        }
      },
      scales: {
        x: { ticks: { color: '#a7a5c0' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: {
          ticks: {
            color: '#a7a5c0',
            callback: v => 'R$ ' + v.toLocaleString('pt-BR')
          },
          grid: { color: 'rgba(255,255,255,0.05)' }
        }
      }
    }
  });
}

// ╔══════════════════════════════════════════════════════════╗
// ║  NAVEGAÇÃO DE MÊS                                       ║
// ╚══════════════════════════════════════════════════════════╝
function mudarMes(delta) {
  const [y, m] = mesSelecionado.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  mesSelecionado = d.toISOString().slice(0, 7);
  renderMesSelector();
  renderPagamentos();
}

// ╔══════════════════════════════════════════════════════════╗
// ║  SALVAR VALOR BASE                                      ║
// ╚══════════════════════════════════════════════════════════╝
async function salvarValorBase() {
  const v = parseFloat(document.getElementById('cfgValorBase').value);
  if (!v || v <= 0) { snack('Informe um valor válido!'); return; }
  showLoading(true);
  try {
    const res = await api({ action: 'setValorBase', login: usuario.login, valor: v });
    if (!res.ok) { snack('Erro: ' + res.error); return; }
    await carregarDados();
    snack('💾 Valor base atualizado!');
  } catch(e) { snack('⚠️ Erro de conexão.'); }
  finally { showLoading(false); }
}

// ╔══════════════════════════════════════════════════════════╗
// ║  REGISTRAR PAGAMENTO                                    ║
// ╚══════════════════════════════════════════════════════════╝
function abrirModal() {
  document.getElementById('pagMes').value   = mesSelecionado;
  document.getElementById('pagValor').value = '';
  document.getElementById('pagDesc').value  = '';
  document.getElementById('pagData').value  = new Date().toISOString().slice(0, 10);
  document.getElementById('addModal').classList.add('open');
}

function fecharModal() {
  document.getElementById('addModal').classList.remove('open');
}

async function salvarPagamento() {
  const valor = parseFloat(document.getElementById('pagValor').value);
  const anoMes = document.getElementById('pagMes').value;
  if (!valor || valor <= 0) { snack('Informe um valor!'); return; }
  if (!anoMes)               { snack('Selecione o mês!'); return; }

  const btn = document.getElementById('btnSalvarPag');
  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    const res = await api({
      action:    'savePagamentoMensal',
      login:     usuario.login,
      anoMes:    anoMes,
      data:      document.getElementById('pagData').value,
      descricao: document.getElementById('pagDesc').value.trim() || 'Pagamento',
      valor:     valor
    });
    if (!res.ok) { snack('Erro: ' + res.error); return; }
    fecharModal();
    await carregarDados();
    snack('✅ Pagamento registrado!');
  } catch(e) { snack('⚠️ Erro de conexão.'); }
  finally { btn.disabled = false; btn.textContent = '✅ Salvar'; }
}

async function excluirPagamento(id) {
  if (!confirm('Excluir este pagamento?')) return;
  showLoading(true);
  try {
    const res = await api({ action: 'deletePagamentoMensal', login: usuario.login, id });
    if (!res.ok) { snack('Erro: ' + res.error); return; }
    await carregarDados();
    snack('🗑️ Pagamento excluído!');
  } catch(e) { snack('⚠️ Erro de conexão.'); }
  finally { showLoading(false); }
}

// ╔══════════════════════════════════════════════════════════╗
// ║  TEMA / UTILS                                           ║
// ╚══════════════════════════════════════════════════════════╝
function toggleTheme() { document.body.classList.toggle('light'); }

function snack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('show', v);
}
</script>
</body>
</html>
